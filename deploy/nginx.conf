##############################################################
# OptionsPay — Nginx Configuration
# Save as: /etc/nginx/sites-available/optionspay
##############################################################

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── Main domain: optionspay.in ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name optionspay.in www.optionspay.in;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name optionspay.in www.optionspay.in;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/optionspay.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/optionspay.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    root /var/www/html;
    index index.html;

    # ── Admin Panel at /admin ─────────────────────────────────
    location /admin {
        alias /var/www/html/admin;
        try_files $uri $uri/ /admin/index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Root redirect to admin (optional) ────────────────────
    location = / {
        return 301 /admin;
    }

    # Default
    location / {
        try_files $uri $uri/ =404;
    }
}

# ── API Subdomain: api.optionspay.in ─────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.optionspay.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.optionspay.in;

    ssl_certificate     /etc/letsencrypt/live/api.optionspay.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.optionspay.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # CORS headers for mobile app
    add_header Access-Control-Allow-Origin "https://optionspay.in" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    # Handle preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Rate limit API endpoints
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # Webhooks — no rate limit (KwikAPI, Ezytm, PayU post here)
    location /api/kwikapi/callback  { proxy_pass http://127.0.0.1:3000; include /etc/nginx/proxy_params; }
    location /api/ezytm/callback    { proxy_pass http://127.0.0.1:3000; include /etc/nginx/proxy_params; }
    location /api/payment/webhook   { proxy_pass http://127.0.0.1:3000; include /etc/nginx/proxy_params; }
    location /api/payment/success   { proxy_pass http://127.0.0.1:3000; include /etc/nginx/proxy_params; }
    location /api/payment/failure   { proxy_pass http://127.0.0.1:3000; include /etc/nginx/proxy_params; }

    # Proxy settings
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }
}
