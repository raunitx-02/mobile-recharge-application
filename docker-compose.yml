version: '3.9'

services:
  # ─── PostgreSQL Database ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vyntra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vyntra_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vyntra_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache & Sessions ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vyntra_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vyntra_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vyntra_db
      DB_USER: postgres
      DB_PASSWORD: vyntra_dev_password
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      ENCRYPTION_KEY: dev-encryption-key-32chars!!!!!!
      FRONTEND_URL: http://localhost:5173
      ADMIN_URL: http://localhost:5174
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  # ─── Admin Panel (optional, for containerized dev) ──────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: vyntra_admin
    restart: unless-stopped
    ports:
      - '5174:5174'
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./admin:/app
      - /app/node_modules
    command: npm run dev
    profiles:
      - full

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: vyntra_network
